<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理員登入</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 後台管理登入</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="帳號 (預設 admin)" required>
        <input type="password" id="password" placeholder="密碼 (預設 admin123)" required>
        <button type="submit">登入系統</button>
    </form>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
            // 關鍵：將 Token 存在瀏覽器中
            localStorage.setItem('adminToken', data.token);
            alert('登入成功！導向管理後台...');
            window.location.href = '/admin.html';
        } else {
            alert(data.message);
        }
    });
</script>
</body>
</html>
