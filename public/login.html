<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員登入 - 教科書線上書櫃中心</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f4f4; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 30px; 
            font-size: 24px; 
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #666; 
            font-weight: bold; 
            font-size: 14px; 
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ced4da; 
            border-radius: 6px; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.3s; 
        }
        .form-group input:focus { 
            border-color: #007bff; 
        }
        .btn-login { 
            width: 100%; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s; 
            margin-top: 10px; 
        }
        .btn-login:hover { 
            background: #1d4ed8; 
        }
        .back-home { 
            text-align: center; 
            margin-top: 20px; 
        }
        .back-home a { 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
        }
        .back-home a:hover { 
            color: #333; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>🔐 後台管理登入</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">帳號</label>
            <input type="text" id="username" placeholder="請輸入管理員帳號" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">密碼</label>
            <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登入系統</button>
    </form>
    
    <div class="back-home">
        <a href="/index.html">⬅️ 返回首頁瀏覽書櫃</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // 阻擋表單預設跳頁行為

        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();

        // 發送登入請求到後端 API
        fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: usernameInput,
                password: passwordInput
            })
        })
        .then(res => {
            if (!res.ok) {
                // 如果後端回傳 401 或 400 等錯誤，先解析錯誤訊息
                return res.json().then(err => { throw new Error(err.message || '帳號或密碼錯誤'); });
            }
            return res.json();
        })
        .then(data => {
            // ⭕ 修正核心：安全地檢查並從 data 物件中取出 token
            if (data.token) {
                // 將合法的 Token 存入瀏覽器的 Local Storage
                localStorage.setItem('token', data.token);
                
                alert('🎉 登入成功！正在前往管理後台...');
                window.location.href = '/admin.html'; // 成功後自動跳轉
            } else {
                alert('登入失敗：後端未回傳認證標記');
            }
        })
        .catch(err => {
            alert(err.message);
            console.error('登入出錯：', err);
        });
    });
</script>

</body>
</html>
