<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教科書線上書櫃中心</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        p { text-align: center; color: #666; }
        
        /* 🔍 搜尋欄樣式 */
        .search-container { text-align: center; margin: 20px 0 30px 0; }
        #searchInput { width: 80%; max-width: 500px; padding: 12px 20px; font-size: 16px; border: 2px solid #007bff; border-radius: 25px; outline: none; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; }
        #searchInput:focus { width: 85%; box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3); }

        /* 書櫃排版 */
        #cabinetListContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .cabinet-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cabinet-header { background: #6c757d; color: white; padding: 10px; font-weight: bold; text-align: center; }
        .cabinet-body { padding: 15px; min-height: 80px; }
        .book-item { background: #f8f9fa; border-left: 4px solid #007bff; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
        .book-info strong { display: block; color: #333; }
        .book-author { font-size: 12px; color: #777; }
        .empty-text { color: #aaa; font-style: italic; display: block; text-align: center; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 教科書線上書櫃中心</h1>
    <p>歡迎瀏覽目前在架教科書，請依書櫃編號尋找您需要的書籍。</p>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="輸入書名關鍵字，自動篩選書櫃..." oninput="filterCabinets()">
    </div>
    
    <div id="cabinetListContainer"></div>
</div>

<script>
    // 1. 全域變數
    let allCabinetsData = []; 
    let allBooksData = [];

    // 2. 確保網頁載入完成後，執行「正確」的函數名稱
    document.addEventListener("DOMContentLoaded", () => {
        loadCabinetBooks(); 
    });

    // 3. 從後端抓取資料
    function loadCabinetBooks() {
        Promise.all([
            fetch('/api/cabinets').then(res => res.json()),
            fetch('/api/books').then(res => res.json())
        ])
        .then(([cabinets, books]) => {
            allCabinetsData = cabinets;
            allBooksData = books;
            renderCabinets(cabinets, books); 
        })
        .catch(err => {
            console.error("前端抓取資料失敗:", err);
        });
    }

    // 4. 渲染書櫃到網頁上
    function renderCabinets(cabinets, books) {
        const container = document.getElementById('cabinetListContainer');
        if (!container) return;
        container.innerHTML = ''; 
        
        cabinets.forEach(cabinet => {
            const currentCabinetBooks = books.filter(b => b.cabinetId === cabinet.id);
            const booksSearchString = currentCabinetBooks.map(b => b.title + b.author).join('||').toLowerCase();

            let cabinetHtml = `
                <div class="cabinet-card" data-books="${booksSearchString}">
                    <div class="cabinet-header">${cabinet.name}</div>
                    <div class="cabinet-body">
            `;
            
            if (currentCabinetBooks.length > 0) {
                cabinetHtml += currentCabinetBooks.map(book => `
                    <div class="book-item">
                        <div class="book-info">
                            <strong>${book.title}</strong> 
                            <span class="book-author">作者：${book.author}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                cabinetHtml += `<span class="empty-text">─ 目前此書櫃空空如也 ─</span>`;
            }
            
            cabinetHtml += `</div></div>`;
            container.innerHTML += cabinetHtml;
        });
    }

    // 5. 搜尋篩選功能
    function filterCabinets() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const cabinetCards = document.querySelectorAll('.cabinet-card');
        
        cabinetCards.forEach(card => {
            const booksInCabinet = card.getAttribute('data-books') || '';
            
            if (keyword === "") {
                card.style.display = "block";
            } else if (booksInCabinet.includes(keyword)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    }
</script>

</body>
</html>
